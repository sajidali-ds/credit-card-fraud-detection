version: "3.9"

services:
  fraud-app:
    build: .
    container_name: fraud-detection-app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./mlflow.db:/app/mlflow.db
    environment:
      - MLFLOW_TRACKING_URI=sqlite:////app/mlflow.db
    restart: unless-stopped

  mlflow-ui:
    build: .
    container_name: fraud-detection-mlflow
    command: mlflow ui --backend-store-uri sqlite:////app/mlflow.db --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow.db:/app/mlflow.db
      - ./models:/app/models
    restart: unless-stopped
